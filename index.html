<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>李思雨小朋友</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#ffe6f2;
    font-family:"Microsoft YaHei", sans-serif;
    text-align:center;
}

h1{
    margin-top:80px;
    color:#ff4d94;
    font-size:42px;
}

p{
    font-size:22px;
    color:#555;
}

#btn{
    position:absolute;
    padding:16px 30px;
    border:none;
    border-radius:40px;
    background:#ff69b4;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 8px 18px #ff9acb;
}

#final{
    display:none;
    margin-top:60px;
    font-size:34px;
    color:#ff1493;
    animation:pop .5s infinite alternate;
}

@keyframes pop{
    from{transform:scale(1)}
    to{transform:scale(1.08)}
}
</style>
</head>

<body>

<h1>李思雨小朋友 🎈</h1>

<p>
你不只是我的女朋友，<br>
还是我每天都想宠的小朋友。
</p >

<button id="btn">抓住我</button>

<div id="final">
🎉 六一儿童节快乐！🎉
<br><br>
永远做我的小朋友 💖
</div>

<script>
const btn = document.getElementById("btn");
const final = document.getElementById("final");

let timer = setInterval(moveButton, 400);

function moveButton(){
    const x = Math.random() * (window.innerWidth - btn.offsetWidth);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

btn.onclick = function(){
    clearInterval(timer);
    btn.style.display = "none";
    final.style.display = "block";
    document.body.style.background = "#fff0f7";
};

moveButton();
</script>

</body>
</html>
