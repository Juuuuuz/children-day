<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>李思雨小朋友</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#ffe6f2;
    font-family:"Microsoft YaHei";
}

h1{
    color:#ff4d94;
    font-size:42px;
    margin-bottom:20px;
    text-align:center;
}

p{
    font-size:22px;
    color:#555;
    margin-bottom:40px;
}

#btn{
    position:absolute;
    padding:16px 30px;
    border:none;
    border-radius:40px;
    background:#ff69b4;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.15s;
}

#final{
    display:none;
    font-size:34px;
    color:#ff1493;
    animation:pop .5s infinite alternate;
}

@keyframes pop{
    from{transform:scale(1)}
    to{transform:scale(1.08)}
}
</style>
</head>

<body>

<h1>李思雨小朋友 🎈</h1>

<p>
你不只是我的女朋友，<br>
还是我每天都想宠的小朋友。
</p>

<button id="btn">
抓住我就祝你六一快乐
</button>

<div id="final">
🎉 六一儿童节快乐！🎉
<br><br>
永远做我的小朋友 💖
</div>

<script>

const btn = document.getElementById("btn");
const final = document.getElementById("final");

let count = 0;

btn.addEventListener("mouseover", () => {

    if(count < 6){

        const x = Math.random() * (window.innerWidth - 200);
        const y = Math.random() * (window.innerHeight - 100);

        btn.style.left = x + "px";
        btn.style.top = y + "px";

        count++;
    }
});

btn.addEventListener("click", () => {

    if(count >= 6){
        btn.style.display = "none";
        final.style.display = "block";
        document.body.style.background = "#fff0f7";
    }
});

</script>

</body>
</html>
